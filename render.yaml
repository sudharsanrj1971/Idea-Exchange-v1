services:
  - type: web
    name: idea-exchange
    runtime: node
    buildCommand: npm install --legacy-peer-deps --include=dev && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGO_URI
        sync: false # You will need to provide your MongoDB Atlas connection string here
      - key: REDIS_URL
        fromService:
          type: redis
          name: ideaxchange-redis
          property: connectionString
      - key: PLATFORM_SIGNING_KEY
        generateValue: true # Render will generate a secure key automatically
      - key: RAFT_INTERNAL_SECRET
        generateValue: true # Render will generate a secure key automatically
      - key: JWT_SECRET
        generateValue: true # Render will generate a secure key automatically
      - key: KEY_VERSION
        value: v1
      - key: CORS_ORIGIN
        sync: false # Set to your deployed service URL (e.g., https://idea-exchange.onrender.com)
      - key: COOKIE_DOMAIN
        sync: false # Set to your domain (e.g., idea-exchange.onrender.com)
      - key: GEMINI_API_KEY
        sync: false # Optional: Add your Gemini API key

  - type: redis
    name: ideaxchange-redis
    ipAllowList: [] # RESTRICTED TO INTERNAL NETWORK FOR SECURITY
