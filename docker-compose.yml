version: '3.8'

services:
  app-node-1:
    build: ./server
    ports:
      - "3001:3000"
    environment:
      - NODE_ID=node-1
      - PORT=3000
    env_file: .env
    networks:
      - ideaxchange-net
    depends_on:
      - mongo
      - redis

  app-node-2:
    build: ./server
    ports:
      - "3002:3000"
    environment:
      - NODE_ID=node-2
      - PORT=3000
    env_file: .env
    networks:
      - ideaxchange-net
    depends_on:
      - mongo
      - redis

  app-node-3:
    build: ./server
    ports:
      - "3003:3000"
    environment:
      - NODE_ID=node-3
      - PORT=3000
    env_file: .env
    networks:
      - ideaxchange-net
    depends_on:
      - mongo
      - redis

  mongo:
    image: mongo:7
    volumes:
      - mongo-data:/data/db
    networks:
      - ideaxchange-net

  redis:
    image: redis:7-alpine
    networks:
      - ideaxchange-net

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - ideaxchange-net
    depends_on:
      - app-node-1
      - app-node-2
      - app-node-3

networks:
  ideaxchange-net:
    driver: bridge

volumes:
  mongo-data:
