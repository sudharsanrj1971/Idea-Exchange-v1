worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    
    sendfile        on;
    keepalive_timeout  65;

    # FIX 09: NGINX SECURITY HEADERS
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; object-src 'none';" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    server_tokens off; # Hide Nginx version

    upstream ideaxchange {
        server app-node-1:3000;
        server app-node-2:3000;
        server app-node-3:3000;
    }

    server {
        listen 80;

        # Health check
        location /health {
            return 200 '{"status":"UP"}';
            add_header Content-Type application/json;
        }

        # FIX 06: Protect Internal Raft Endpoints from External Access
        location /raft/ {
            deny all;
            return 403;
        }

        # Main API & Frontend
        location / {
            proxy_pass http://ideaxchange;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # Rate limiting could also be implemented here at the L7 layer
        }
    }
}
